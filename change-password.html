<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 변경 — 학급 마니또</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    .emoji { font-size: 48px; display: block; margin-bottom: 12px; }

    h1 { font-size: 20px; font-weight: 700; color: #3a3af4; margin-bottom: 8px; }

    .desc {
      font-size: 13px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 14px; text-align: left; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      text-align: center;
      letter-spacing: 6px;
      font-weight: 700;
    }

    input:focus { border-color: #3a3af4; }

    .btn {
      width: 100%;
      padding: 13px;
      background: #3a3af4;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .btn:hover { background: #2929d4; }

    .error-msg {
      color: #e53935;
      font-size: 13px;
      margin-top: 10px;
      min-height: 18px;
    }

    .hint {
      font-size: 12px;
      color: #aaa;
      margin-top: 6px;
    }
  </style>
</head>
<body>

<div class="card">
  <span class="emoji">🔐</span>
  <h1>비밀번호를 바꿔주세요!</h1>
  <p class="desc">
    처음 로그인하셨어요!<br>
    나만 아는 <strong>4자리 숫자</strong> 비밀번호를 설정해주세요.
  </p>

  <div class="form-group">
    <label>새 비밀번호 (4자리 숫자)</label>
    <input type="password" id="pw1" placeholder="● ● ● ●" maxlength="4" inputmode="numeric">
  </div>

  <div class="form-group">
    <label>비밀번호 확인</label>
    <input type="password" id="pw2" placeholder="● ● ● ●" maxlength="4" inputmode="numeric"
      onkeydown="if(event.key==='Enter') changePassword()">
    <p class="hint">친구들이 유추하기 어려운 숫자로 설정하세요!</p>
  </div>

  <button class="btn" onclick="changePassword()">설정 완료!</button>
  <div class="error-msg" id="error-msg"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAyrDvr4m6TpBaZvqLDnQ_VAaKEQfKlNuI",
    authDomain: "class-manitoo.firebaseapp.com",
    projectId: "class-manitoo",
    storageBucket: "class-manitoo.firebasestorage.app",
    messagingSenderId: "415504976007",
    appId: "1:415504976007:web:538c799557c9ef39ae9022"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const userId = sessionStorage.getItem('userId');
  if (!userId) window.location.href = 'index.html';

  async function changePassword() {
    const pw1 = document.getElementById('pw1').value.trim();
    const pw2 = document.getElementById('pw2').value.trim();
    const errorEl = document.getElementById('error-msg');

    errorEl.textContent = '';

    if (!pw1 || !pw2) {
      errorEl.textContent = '비밀번호를 입력해주세요.';
      return;
    }
    if (pw1.length !== 4 || isNaN(pw1)) {
      errorEl.textContent = '4자리 숫자로 입력해주세요.';
      return;
    }
    if (pw1 !== pw2) {
      errorEl.textContent = '비밀번호가 일치하지 않아요.';
      return;
    }

    try {
      await db.collection('users').doc(userId).update({
        password: pw1,
        isFirstLogin: false
      });
      window.location.href = 'student.html';
    } catch (e) {
      errorEl.textContent = '오류가 발생했어요: ' + e.message;
    }
  }
</script>

</body>
</html>
